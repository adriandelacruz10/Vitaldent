    <style>
        .agenda-wrapper {
            padding: 10px 18px 30px 18px;
        }

        .agenda-card {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            border: 1px solid #eef1f6;
        }

        .agenda-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
        }

        .agenda-title {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 700;
            color: #1f2937;
        }

        .agenda-subtitle {
            margin: 4px 0 0 0;
            color: #6b7280;
            font-size: 0.95rem;
        }

        .agenda-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            border: 1px solid #eef1f6;
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 20px;
        }

        .agenda-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .agenda-date-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .agenda-date-group label {
            margin: 0;
            font-weight: 600;
            color: #374151;
        }

        .agenda-date-group input[type="date"] {
            border-radius: 10px;
            border: 1px solid #dbe2ea;
            padding: 8px 12px;
            height: 42px;
            background: #fff;
        }

        .btn-soft-primary {
            background: #eef4ff;
            color: #2563eb;
            border: 1px solid #dbe7ff;
            border-radius: 10px;
            padding: 9px 14px;
            font-weight: 600;
        }

        .btn-soft-primary:hover {
            background: #dfeafe;
            color: #1d4ed8;
        }

        .btn-soft-dark {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 9px 14px;
            font-weight: 600;
        }

        .btn-soft-dark:hover {
            background: #e5e7eb;
            color: #111827;
        }

        .agenda-section {
            margin-top: 18px;
            margin-bottom: 18px;
        }

        .agenda-table-wrap {
            overflow-x: auto;
            border: 1px solid #eef1f6;
            border-radius: 16px;
        }

        .agenda-table {
            margin-bottom: 0;
            background: #fff;
        }

        .agenda-table thead th {
            background: #f8fafc;
            color: #475569;
            font-weight: 700;
            border-top: 0;
            border-bottom: 1px solid #e5e7eb;
            padding: 14px 12px;
            font-size: 0.92rem;
        }

        .agenda-table tbody tr {
            transition: background 0.2s ease;
        }

        .agenda-table tbody tr:hover {
            background: #fafcff;
        }

        .agenda-table tbody td,
        .agenda-table tbody th {
            vertical-align: middle;
            padding: 12px;
            border-top: 1px solid #1e3b8a57;
        }

        .agenda-hour {
            font-weight: 700;
            color: #1e3a8a;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .cell-input {
            width: 100%;
            border: none;
            background: transparent;
            color: #334155;
            font-size: 0.95rem;
            outline: none;
        }

        .cell-input:disabled {
            background: transparent;
            color: #334155;
            opacity: 1;
        }

        .actions-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn-agenda-primary {
            border-radius: 10px;
            font-weight: 600;
            padding: 6px 12px;
            border: 1px solid #bfdbfe;
            background: #eff6ff;
            color: #2563eb;
        }

        .btn-agenda-primary:hover {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .btn-agenda-danger {
            border-radius: 10px;
            font-weight: 600;
            padding: 6px 12px;
            border: 1px solid #fecaca;
            background: #fef2f2;
            color: #dc2626;
        }

        .btn-agenda-danger:hover {
            background: #fee2e2;
            color: #b91c1c;
        }

        .mini-panel {
            background: #f8fafc;
            border: 1px solid #eef1f6;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 18px;
        }

        .mini-panel hr {
            margin-top: 1rem;
            margin-bottom: 1rem;
        }

        #agendar,
        #datosCita,
        #alerta {
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .agenda-card {
                padding: 16px;
            }

            .agenda-header {
                align-items: flex-start;
            }

            .agenda-title {
                font-size: 1.3rem;
            }

            .agenda-toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .agenda-date-group {
                flex-direction: column;
                align-items: stretch;
            }
        }

        .slot-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .slot-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 12px;
            display: flex;
            gap: 30px;
        }

        .slot-card.empty {
            background: #fcfcfd;
            border-style: dashed;
            color: #94a3b8;
            text-align: center;
        }

        .slot-name {
            font-weight: 700;
            color: #1f2937;
            margin-top: 8px;
        }

        .slot-meta {
            color: #475569;
            font-size: 0.92rem;
            margin-top: 8px;
        }

        .slot-obs {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 8px;
            margin-right: 10px;
        }

        .agenda-add-wrap {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .search-hint {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
        }
    </style>
