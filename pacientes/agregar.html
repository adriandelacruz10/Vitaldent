                <!--Formulario de agregar paciente-->
                <form>
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label class="col-sm-2 col-form-label">Nombre</label>
                            <div class="col-sm-8">
                                <input type="text" class="form-control" id="txtNombre" placeholder="Ingrese el nombre">
                            </div>
                        </div>
                        <div class="form-group col-md-6">
                            <label class="col-sm-2 col-form-label">Apellido</label>
                            <div class="col-sm-8">
                                <input type="text" class="form-control" id="txtApellido"
                                    placeholder="Ingrese el apellido">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 col-form-label">Cédula</label>
                        <div class="col-sm-10">
                            <input type="text" class="form-control" id="txtCedula" placeholder="Ingrese la cédula">
                        </div>
                    </div>
                    <fieldset class="form-group">
                        <div>
                            <legend class="col-form-label col-sm-2 pt-0">Género</legend>
                            <div class="col-sm-10">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="radioGenero" id="radioHombre"
                                        value="Hombre" checked>
                                    <label class="form-check-label" for="radioHombre">
                                        Hombre
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="radioGenero" id="radioMujer"
                                        value="Mujer">
                                    <label class="form-check-label" for="radioHombre">
                                        Mujer
                                    </label>
                                </div>
                            </div>
                        </div>
                    </fieldset>
                    <div class="form-group">
                        <label class="col-sm-2 col-form-label">Fecha de Nacimiento</label>
                        <div class="col-sm-10">
                            <input type="date" id="fechaNac" class="form-control">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label class="col-sm-2 col-form-label">Teléfono 1</label>
                            <div class="col-sm-10">
                                <input type="tel" class="form-control" id="txtTel1" placeholder="Ingrese el teléfono 1">
                            </div>
                        </div>
                        <div class="form-group col-md-6">
                            <label class="col-sm-2 col-form-label">Teléfono 2</label>
                            <div class="col-sm-8">
                                <input type="tel" class="form-control" id="txtTel2" placeholder="Ingrese el teléfono 2">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 col-form-label">Dirección</label>
                        <div class="col-sm-10">
                            <input type="text" class="form-control" id="txtDireccion"
                                placeholder="Ingrese la dirección">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 col-form-label">Observaciones</label>
                        <div class="col-sm-10">
                            <input type="text" class="form-control" id="txtObservaciones"
                                placeholder="Ingrese las observaciones">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-2 col-form-label">Plan de tratamiento</label>
                        <div class="col-sm-10">
                            <textarea class="form-control" id="txtPlan" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="col-sm-10">
                            <button type="button" id="btnAgregarPaciente"
                                class="btn btn-primary btn-lg btn-block">Añadir paciente</button>
                        </div>
                    </div>
